<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Trip Budget</title>
<style>
  :root {
    --bg: #0f1115; --card: #1a1e26; --card2: #232936; --line: #2e3542;
    --text: #eef1f6; --dim: #8b93a3; --accent: #34c8a0;
    --red: #ff6b6b; --amber: #ffb454; --blue: #6aa9ff;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font: 16px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { padding-bottom: calc(76px + env(safe-area-inset-bottom)); }

  header { padding: calc(14px + env(safe-area-inset-top)) 16px 10px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 20px; margin: 0; font-weight: 700; }
  header .sub { color: var(--dim); font-size: 12px; }
  #refresh { background: none; border: 1px solid var(--line); color: var(--dim); border-radius: 10px; padding: 6px 12px; font-size: 13px; }

  .page { display: none; padding: 0 14px; }
  .page.active { display: block; }

  /* Bottom tab bar */
  nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: rgba(20,23,30,.96);
    backdrop-filter: blur(12px); border-top: 1px solid var(--line); padding-bottom: env(safe-area-inset-bottom); z-index: 10; }
  nav button { flex: 1; background: none; border: none; color: var(--dim); font-size: 12px; padding: 10px 0 8px; }
  nav button .ico { display: block; font-size: 22px; margin-bottom: 2px; }
  nav button.active { color: var(--accent); }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 14px; margin-bottom: 12px; }
  label.f { display: block; color: var(--dim); font-size: 12px; text-transform: uppercase; letter-spacing: .06em; margin: 14px 0 6px; }
  label.f:first-child { margin-top: 0; }

  .seg { display: flex; gap: 8px; }
  .seg button { flex: 1; padding: 12px 0; border-radius: 12px; border: 1px solid var(--line);
    background: var(--card2); color: var(--text); font-size: 15px; font-weight: 600; }
  .seg button.on { background: var(--accent); border-color: var(--accent); color: #08251d; }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chips button { padding: 10px 14px; border-radius: 20px; border: 1px solid var(--line);
    background: var(--card2); color: var(--text); font-size: 14px; }
  .chips button.on { background: var(--accent); border-color: var(--accent); color: #08251d; font-weight: 700; }

  .amt-row { display: flex; gap: 8px; align-items: stretch; }
  #amount { flex: 1; font-size: 30px; font-weight: 700; padding: 10px 14px; border-radius: 12px;
    border: 1px solid var(--line); background: var(--card2); color: var(--text); width: 100%; }
  #amount:focus { outline: 2px solid var(--accent); }
  .cur { display: flex; gap: 6px; }
  .cur button { width: 64px; border-radius: 12px; border: 1px solid var(--line); background: var(--card2); color: var(--text); font-weight: 700; }
  .cur button.on { background: var(--blue); border-color: var(--blue); color: #041a38; }

  input[type=text], input[type=date] { width: 100%; padding: 12px 14px; border-radius: 12px;
    border: 1px solid var(--line); background: var(--card2); color: var(--text); font-size: 16px; }

  #submit { width: 100%; margin-top: 18px; padding: 16px; border: none; border-radius: 14px;
    background: var(--accent); color: #08251d; font-size: 17px; font-weight: 800; }
  #submit:disabled { opacity: .5; }
  #msg { text-align: center; margin-top: 10px; font-size: 14px; min-height: 20px; }
  #msg.ok { color: var(--accent); } #msg.err { color: var(--red); }

  /* Transactions */
  .totals { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .tot { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 12px; }
  .tot .v { font-size: 20px; font-weight: 800; }
  .tot .k { color: var(--dim); font-size: 12px; margin-top: 2px; }
  .tx { display: flex; justify-content: space-between; align-items: center; padding: 12px 2px; border-bottom: 1px solid var(--line); }
  .tx:last-child { border-bottom: none; }
  .tx .l .t { font-weight: 600; }
  .tx .l .s { color: var(--dim); font-size: 12px; margin-top: 2px; }
  .tx .r { text-align: right; }
  .tx .r .a { font-weight: 800; font-size: 16px; }
  .tx .r .c { color: var(--dim); font-size: 11px; }
  .day-h { color: var(--dim); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; margin: 14px 2px 4px; }

  /* Analysis */
  .verdict { border-radius: 16px; padding: 16px; margin-bottom: 12px; font-weight: 700; font-size: 16px; border: 1px solid var(--line); }
  .verdict.good { background: rgba(52,200,160,.12); border-color: rgba(52,200,160,.5); color: var(--accent); }
  .verdict.warn { background: rgba(255,180,84,.12); border-color: rgba(255,180,84,.5); color: var(--amber); }
  .verdict.bad  { background: rgba(255,107,107,.12); border-color: rgba(255,107,107,.5); color: var(--red); }
  .verdict .d { font-weight: 400; font-size: 13px; color: var(--text); margin-top: 6px; }
  .bar-row { margin: 12px 0; }
  .bar-row .hd { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
  .bar-row .hd .n { font-weight: 700; }
  .bar-row .hd .v { color: var(--dim); }
  .bar { height: 10px; background: var(--card2); border-radius: 6px; overflow: hidden; position: relative; }
  .bar .fill { height: 100%; border-radius: 6px; background: var(--accent); }
  .bar .fill.over { background: var(--red); }
  .bar .fill.close { background: var(--amber); }
  .pace-mark { position: absolute; top: -2px; bottom: -2px; width: 2px; background: var(--dim); }
  .empty { color: var(--dim); text-align: center; padding: 40px 0; }
  .note { color: var(--dim); font-size: 12px; margin: 6px 2px 14px; }
</style>
</head>
<body>
<header>
  <div>
    <h1 id="title">Trip Budget 🇹🇼</h1>
    <div class="sub" id="subtitle">&nbsp;</div>
  </div>
  <button id="refresh">↻ Sync</button>
</header>

<!-- ============ ADD ============ -->
<div class="page active" id="page-add">
  <div class="card">
    <label class="f">Owner</label>
    <div class="seg" id="owner">
      <button data-v="Andrew" class="on">Andrew</button>
      <button data-v="Keren">Keren</button>
    </div>

    <label class="f">Payment</label>
    <div class="seg" id="payment">
      <button data-v="Cash" class="on">Cash</button>
      <button data-v="Credit">Credit</button>
      <button data-v="Transfer">Transfer</button>
    </div>

    <label class="f">Amount</label>
    <div class="amt-row">
      <input id="amount" type="text" inputmode="decimal" placeholder="0">
      <div class="cur seg" id="currency">
        <button data-v="NT" class="on">NT$</button>
        <button data-v="USD">US$</button>
      </div>
    </div>

    <label class="f">Type</label>
    <div class="chips" id="type"></div>

    <label class="f">Date</label>
    <input id="date" type="date">

    <label class="f">Notes</label>
    <input id="notes" type="text" placeholder="Optional — what was it?">

    <button id="submit">Add transaction</button>
    <div id="msg"></div>
  </div>
</div>

<!-- ============ TRANSACTIONS ============ -->
<div class="page" id="page-tx">
  <div class="totals" id="totals"></div>
  <div class="card" id="txlist"><div class="empty">Loading…</div></div>
</div>

<!-- ============ ANALYSIS ============ -->
<div class="page" id="page-an">
  <div id="analysis"><div class="empty">Loading…</div></div>
  <div class="note">Budgets, trip dates and the NT→USD rate are editable in the “Budget” tab of the Google Sheet.</div>
</div>

<nav>
  <button data-page="add" class="active"><span class="ico">＋</span>Add</button>
  <button data-page="tx"><span class="ico">☰</span>Transactions</button>
  <button data-page="an"><span class="ico">◔</span>Analysis</button>
</nav>

<script>
const $ = (s) => document.querySelector(s);
const FALLBACK_TYPES = ['Food','Transport','Lodging','Shopping','Activities','Gifts','Other'];
let DATA = null;          // { transactions, budget }
const state = { owner:'Andrew', payment:'Cash', currency:'NT', type:'Food' };

// ---- helpers -------------------------------------------------------------
const todayISO = () => { const d = new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
$('#date').value = todayISO();
const fmt = (n, dec=0) => Number(n).toLocaleString('en-US', {maximumFractionDigits: dec, minimumFractionDigits: 0});
const usd = (tx) => { const r = DATA?.budget?.ntPerUsd || 30; return tx.Currency === 'USD' ? Number(tx.Amount) : Number(tx.Amount) / r; };

// ---- segmented controls ---------------------------------------------------
function wireSeg(id, key) {
  $('#'+id).addEventListener('click', (e) => {
    const b = e.target.closest('button'); if (!b) return;
    document.querySelectorAll('#'+id+' button').forEach(x => x.classList.remove('on'));
    b.classList.add('on'); state[key] = b.dataset.v;
  });
}
wireSeg('owner','owner'); wireSeg('payment','payment'); wireSeg('currency','currency');

function renderTypeChips() {
  const cats = DATA && Object.keys(DATA.budget.categories).length ? Object.keys(DATA.budget.categories) : FALLBACK_TYPES;
  if (!cats.includes(state.type)) state.type = cats[0];
  $('#type').innerHTML = cats.map(c => `<button data-v="${c}" class="${c===state.type?'on':''}">${c}</button>`).join('');
}
renderTypeChips();
wireSeg('type','type');

// ---- tab nav ---------------------------------------------------------------
document.querySelector('nav').addEventListener('click', (e) => {
  const b = e.target.closest('button'); if (!b) return;
  document.querySelectorAll('nav button').forEach(x => x.classList.toggle('active', x===b));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  $('#page-'+b.dataset.page).classList.add('active');
});

// ---- data ------------------------------------------------------------------
async function load() {
  $('#subtitle').textContent = 'Syncing…';
  try {
    const r = await fetch('/api/data');
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || r.status);
    DATA = d;
    localStorage.setItem('tripbudget', JSON.stringify(d));
    renderAll();
    $('#subtitle').textContent = d.transactions.length + ' transactions · rate ' + d.budget.ntPerUsd + ' NT/USD';
  } catch (e) {
    $('#subtitle').textContent = '⚠️ ' + e.message;
  }
}
const cached = localStorage.getItem('tripbudget');
if (cached) { try { DATA = JSON.parse(cached); renderAll(); } catch {} }
load();
$('#refresh').addEventListener('click', load);

// ---- submit -----------------------------------------------------------------
$('#submit').addEventListener('click', async () => {
  const amount = parseFloat(($('#amount').value || '').replace(/,/g,''));
  const msg = $('#msg');
  if (!isFinite(amount) || amount <= 0) { msg.className='err'; msg.textContent = 'Enter an amount'; return; }
  const body = { date: $('#date').value || todayISO(), owner: state.owner, payment: state.payment,
    amount, currency: state.currency, type: state.type, notes: $('#notes').value.trim() };
  $('#submit').disabled = true; msg.className=''; msg.textContent = 'Saving…';
  try {
    const r = await fetch('/api/transactions', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || r.status);
    msg.className='ok'; msg.textContent = '✓ Saved ' + (body.currency==='NT'?'NT$':'US$') + fmt(amount,2) + ' — ' + body.type;
    $('#amount').value=''; $('#notes').value='';
    if (DATA) { DATA.transactions.push({ Date: body.date, Owner: body.owner, Payment: body.payment, Amount: amount, Currency: body.currency, Type: body.type, Notes: body.notes, 'Logged At': new Date().toISOString() }); renderAll(); }
  } catch (e) { msg.className='err'; msg.textContent = '✗ ' + e.message; }
  $('#submit').disabled = false;
});

// ---- render: transactions ----------------------------------------------------
function renderAll() { renderTypeChips(); renderTx(); renderAnalysis(); }

function renderTx() {
  const txs = (DATA?.transactions || []).slice().sort((a,b) => (b.Date+ (b['Logged At']||'')).localeCompare(a.Date + (a['Logged At']||'')));
  const totNT = txs.filter(t=>t.Currency==='NT').reduce((s,t)=>s+Number(t.Amount),0);
  const totUSD = txs.filter(t=>t.Currency==='USD').reduce((s,t)=>s+Number(t.Amount),0);
  const all = txs.reduce((s,t)=>s+usd(t),0);
  const byOwner = {};
  txs.forEach(t => byOwner[t.Owner] = (byOwner[t.Owner]||0) + usd(t));
  $('#totals').innerHTML = `
    <div class="tot"><div class="v">$${fmt(all,0)}</div><div class="k">Total spent (USD eq.)</div></div>
    <div class="tot"><div class="v">NT$${fmt(totNT)}</div><div class="k">+ US$${fmt(totUSD,0)} cash/card</div></div>
    <div class="tot"><div class="v">$${fmt(byOwner['Andrew']||0,0)}</div><div class="k">Andrew</div></div>
    <div class="tot"><div class="v">$${fmt(byOwner['Keren']||0,0)}</div><div class="k">Keren</div></div>`;
  if (!txs.length) { $('#txlist').innerHTML = '<div class="empty">No transactions yet — add your first!</div>'; return; }
  let html = '', lastDay = '';
  for (const t of txs) {
    if (t.Date !== lastDay) { html += `<div class="day-h">${t.Date}</div>`; lastDay = t.Date; }
    html += `<div class="tx">
      <div class="l"><div class="t">${t.Type}${t.Notes ? ' · <span style="font-weight:400">'+escapeHtml(t.Notes)+'</span>' : ''}</div>
        <div class="s">${t.Owner} · ${t.Payment}</div></div>
      <div class="r"><div class="a">${t.Currency==='NT'?'NT$':'US$'}${fmt(t.Amount,2)}</div>
        <div class="c">≈ $${fmt(usd(t),1)}</div></div>
    </div>`;
  }
  $('#txlist').innerHTML = html;
}
function escapeHtml(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// ---- render: analysis -----------------------------------------------------------
function renderAnalysis() {
  if (!DATA) return;
  const b = DATA.budget, txs = DATA.transactions || [];
  const cats = Object.keys(b.categories);
  const totalBudget = cats.reduce((s,c)=>s+b.categories[c],0);
  const spentBy = {}; let totalSpent = 0;
  for (const t of txs) { const u = usd(t); totalSpent += u; spentBy[t.Type] = (spentBy[t.Type]||0) + u; }

  // Trip pacing
  let paceHtml = '', pacePct = null;
  if (b.tripStart && b.tripEnd) {
    const start = new Date(b.tripStart+'T00:00'), end = new Date(b.tripEnd+'T23:59'), now = new Date();
    const total = (end-start), gone = Math.min(Math.max(now-start,0), total);
    pacePct = total > 0 ? gone/total : null;
    const daysTotal = Math.round(total/864e5), daysGone = Math.min(Math.ceil(Math.max(now-start,0)/864e5), daysTotal);
    if (now < start) paceHtml = `Trip starts ${b.tripStart} — pre-trip spending so far.`;
    else if (now > end) paceHtml = `Trip ended ${b.tripEnd}.`;
    else paceHtml = `Day ${daysGone} of ${daysTotal} (${Math.round(pacePct*100)}% through the trip).`;
  }

  const usedPct = totalBudget > 0 ? totalSpent/totalBudget : 0;
  let cls = 'good', headline = '✅ On track';
  if (pacePct !== null && pacePct > 0) {
    const ratio = usedPct / pacePct;
    if (usedPct >= 1) { cls='bad'; headline = '🚨 Over total budget'; }
    else if (ratio > 1.15) { cls='bad'; headline = '🚨 Ahead of budget pace'; }
    else if (ratio > 0.95) { cls='warn'; headline = '⚠️ Right at budget pace'; }
    else headline = '✅ On track — under pace';
  } else if (usedPct >= 1) { cls='bad'; headline='🚨 Over total budget'; }
  else if (usedPct > 0.85) { cls='warn'; headline='⚠️ Close to total budget'; }

  let html = `<div class="verdict ${cls}">${headline}
    <div class="d">Spent <b>$${fmt(totalSpent,0)}</b> of <b>$${fmt(totalBudget,0)}</b> budget (${Math.round(usedPct*100)}%). ${paceHtml}</div></div>`;

  html += '<div class="card">';
  const rows = cats.map(c => ({ c, spent: spentBy[c]||0, bud: b.categories[c] }));
  // Any spending in types not in the budget list still shows up.
  for (const t of Object.keys(spentBy)) if (!cats.includes(t)) rows.push({ c: t, spent: spentBy[t], bud: 0 });
  rows.sort((a,z) => (z.spent/(z.bud||1)) - (a.spent/(a.bud||1)));
  for (const r of rows) {
    const pct = r.bud > 0 ? r.spent/r.bud : (r.spent>0?1:0);
    const fillCls = pct >= 1 ? 'over' : pct > 0.85 ? 'close' : '';
    html += `<div class="bar-row">
      <div class="hd"><span class="n">${r.c}</span><span class="v">$${fmt(r.spent,0)} / $${fmt(r.bud,0)} · ${Math.round(pct*100)}%</span></div>
      <div class="bar"><div class="fill ${fillCls}" style="width:${Math.min(pct*100,100)}%"></div>
      ${pacePct !== null ? `<div class="pace-mark" style="left:${Math.min(pacePct*100,100)}%"></div>` : ''}</div>
    </div>`;
  }
  html += '</div>';
  html += `<div class="note">Grey tick on each bar = where spending “should” be today if spread evenly across the trip. NT amounts converted at ${b.ntPerUsd} NT/USD.</div>`;
  $('#analysis').innerHTML = html;
}
</script>
</body>
</html>
