<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f4f5f7">
<title>Trip Budget</title>
<style>
  :root {
    --bg: #f4f5f7; --card: #ffffff; --card2: #eef0f4; --line: #e2e5eb;
    --text: #1c2230; --dim: #6b7280; --accent: #0ea47a; --accent-text: #ffffff;
    --red: #d64545; --amber: #c77a17; --blue: #2f6fed;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font: 16px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { padding-bottom: calc(76px + env(safe-area-inset-bottom)); }

  header { padding: calc(14px + env(safe-area-inset-top)) 16px 10px; }
  header h1 { font-size: 20px; margin: 0; font-weight: 700; }
  header .sub { color: var(--dim); font-size: 12px; }

  .page { display: none; padding: 0 14px; }
  .page.active { display: block; }

  nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: rgba(255,255,255,.96);
    backdrop-filter: blur(12px); border-top: 1px solid var(--line); padding-bottom: env(safe-area-inset-bottom); z-index: 10; }
  nav button { flex: 1; background: none; border: none; color: var(--dim); font-size: 12px; padding: 10px 0 8px; }
  nav button .ico { display: block; font-size: 22px; margin-bottom: 2px; }
  nav button.active { color: var(--accent); font-weight: 700; }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 14px; margin-bottom: 12px;
    box-shadow: 0 1px 3px rgba(20,30,50,.05); }
  label.f { display: block; color: var(--dim); font-size: 12px; text-transform: uppercase; letter-spacing: .06em; margin: 14px 0 6px; }
  label.f:first-child { margin-top: 0; }

  .seg { display: flex; gap: 8px; }
  .seg button { flex: 1; padding: 12px 0; border-radius: 12px; border: 1px solid var(--line);
    background: var(--card2); color: var(--text); font-size: 15px; font-weight: 600; }
  .seg button.on { background: var(--accent); border-color: var(--accent); color: var(--accent-text); }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chips button { padding: 10px 14px; border-radius: 20px; border: 1px solid var(--line);
    background: var(--card2); color: var(--text); font-size: 14px; }
  .chips button.on { background: var(--accent); border-color: var(--accent); color: var(--accent-text); font-weight: 700; }

  .amt-row { display: flex; gap: 8px; align-items: stretch; }
  #amount, #received { font-size: 26px; font-weight: 700; padding: 10px 14px; border-radius: 12px;
    border: 1px solid var(--line); background: var(--card); color: var(--text); width: 100%; }
  #amount { flex: 1; }
  #amount:focus, #received:focus, input[type=text]:focus, input[type=date]:focus { outline: 2px solid var(--accent); }
  .cur { display: flex; gap: 6px; }
  .cur button { width: 64px; border-radius: 12px; border: 1px solid var(--line); background: var(--card2); color: var(--text); font-weight: 700; }
  .cur button.on { background: var(--blue); border-color: var(--blue); color: #fff; }

  input[type=text], input[type=date] { width: 100%; padding: 12px 14px; border-radius: 12px;
    border: 1px solid var(--line); background: var(--card); color: var(--text); font-size: 16px; }

  .cond { display: none; }
  .cond.show { display: block; }

  #submit { width: 100%; margin-top: 18px; padding: 16px; border: none; border-radius: 14px;
    background: var(--accent); color: #fff; font-size: 17px; font-weight: 800; }
  #submit:disabled { opacity: .5; }
  #msg { text-align: center; margin-top: 10px; font-size: 14px; min-height: 20px; }
  #msg.ok { color: var(--accent); } #msg.err { color: var(--red); }

  /* Transactions */
  .totals { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .tot { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 12px; }
  .tot .v { font-size: 20px; font-weight: 800; }
  .tot .k { color: var(--dim); font-size: 12px; margin-top: 2px; }
  .hold { display: flex; justify-content: space-between; padding: 8px 2px; border-bottom: 1px solid var(--line); }
  .hold:last-child { border-bottom: none; }
  .hold .who { font-weight: 700; }
  .hold .amts { text-align: right; font-size: 14px; }
  .hold .amts .u { color: var(--dim); font-size: 12px; }
  .sec-h { color: var(--dim); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; margin: 4px 2px 8px; }

  .tx { display: flex; justify-content: space-between; align-items: center; padding: 12px 2px; border-bottom: 1px solid var(--line); }
  .tx:last-child { border-bottom: none; }
  .tx .l .t { font-weight: 600; }
  .tx .l .t .tag { font-size: 11px; font-weight: 700; color: var(--accent); background: rgba(14,164,122,.1);
    border-radius: 8px; padding: 2px 7px; margin-left: 6px; vertical-align: 1px; }
  .tx .l .s { color: var(--dim); font-size: 12px; margin-top: 2px; }
  .tx .r { text-align: right; }
  .tx .r .a { font-weight: 800; font-size: 16px; }
  .tx .r .c { color: var(--dim); font-size: 11px; }
  .tx.flow .l .t { color: var(--blue); }
  .day-h { display: flex; justify-content: space-between; color: var(--dim); font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .06em; margin: 14px 2px 4px; }
  .empty { color: var(--dim); text-align: center; padding: 40px 0; }
  .note { color: var(--dim); font-size: 12px; margin: 6px 2px 14px; }
</style>
</head>
<body>
<header>
  <h1 id="title">Trip Budget 🇹🇼</h1>
  <div class="sub" id="subtitle">&nbsp;</div>
</header>

<!-- ============ ADD ============ -->
<div class="page active" id="page-add">
  <div class="card">
    <label class="f">Owner</label>
    <div class="seg" id="owner">
      <button data-v="Andrew" class="on">Andrew</button>
      <button data-v="Keren">Keren</button>
    </div>

    <label class="f">Type</label>
    <div class="chips" id="type">
      <button data-v="Food" class="on">Food</button>
      <button data-v="Transport">Transport</button>
      <button data-v="Lodging">Lodging</button>
      <button data-v="Shopping">Shopping</button>
      <button data-v="Activities">Activities</button>
      <button data-v="Gifts">Gifts</button>
      <button data-v="Other">Other</button>
      <button data-v="Exchange">💱 Exchange</button>
      <button data-v="Transfer">↔︎ Give cash</button>
    </div>

    <div class="cond show" id="meal-wrap">
      <label class="f">Meal</label>
      <div class="chips" id="meal">
        <button data-v="Breakfast">Breakfast</button>
        <button data-v="Lunch">Lunch</button>
        <button data-v="Dinner">Dinner</button>
        <button data-v="Snack">Snack</button>
        <button data-v="Drinks">Drinks</button>
      </div>
    </div>

    <div class="cond" id="to-wrap">
      <label class="f">Give to</label>
      <div class="seg" id="to">
        <button data-v="Andrew">Andrew</button>
        <button data-v="Keren" class="on">Keren</button>
      </div>
    </div>

    <label class="f">Payment</label>
    <div class="seg" id="payment">
      <button data-v="Cash" class="on">Cash</button>
      <button data-v="Credit">Credit</button>
      <button data-v="Transfer">Transfer</button>
    </div>

    <label class="f" id="amount-label">Amount</label>
    <div class="amt-row">
      <input id="amount" type="text" inputmode="decimal" placeholder="0">
      <div class="cur seg" id="currency">
        <button data-v="NT" class="on">NT$</button>
        <button data-v="USD">US$</button>
      </div>
    </div>

    <div class="cond" id="received-wrap">
      <label class="f">NT$ received</label>
      <input id="received" type="text" inputmode="decimal" placeholder="0">
    </div>

    <label class="f">Date</label>
    <input id="date" type="date">

    <label class="f">Notes</label>
    <input id="notes" type="text" placeholder="Optional — what was it?">

    <button id="submit">Add transaction</button>
    <div id="msg"></div>
  </div>
</div>

<!-- ============ TRANSACTIONS ============ -->
<div class="page" id="page-tx">
  <div class="totals" id="totals"></div>
  <div class="card"><div class="sec-h">Cash on hand</div><div id="holdings"></div></div>
  <div class="card" id="txlist"><div class="empty">Loading…</div></div>
</div>

<!-- ============ ANALYSIS ============ -->
<div class="page" id="page-an">
  <div class="card"><div class="empty">📊 Coming soon</div></div>
</div>

<nav>
  <button data-page="add" class="active"><span class="ico">＋</span>Add</button>
  <button data-page="tx"><span class="ico">☰</span>Transactions</button>
  <button data-page="an"><span class="ico">◔</span>Analysis</button>
</nav>

<script>
const $ = (s) => document.querySelector(s);
const state = { owner:'Andrew', payment:'Cash', currency:'NT', type:'Food', meal:'', to:'Keren' };
let DATA = null;

// ---- helpers -------------------------------------------------------------
const todayISO = () => { const d = new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
$('#date').value = todayISO();
const fmt = (n, dec=0) => Number(n).toLocaleString('en-US', {maximumFractionDigits: dec, minimumFractionDigits: 0});
const rate = () => DATA?.budget?.ntPerUsd || 30;
const usd = (t) => t.Currency === 'USD' ? Number(t.Amount) : Number(t.Amount) / rate();
const isFlow = (t) => t.Type === 'Exchange' || t.Type === 'Transfer';

// ---- segmented controls -----------------------------------------------------
function wireSeg(id, key, after) {
  $('#'+id).addEventListener('click', (e) => {
    const b = e.target.closest('button'); if (!b) return;
    document.querySelectorAll('#'+id+' button').forEach(x => x.classList.remove('on'));
    b.classList.add('on'); state[key] = b.dataset.v;
    if (after) after();
  });
}
wireSeg('owner','owner');
wireSeg('payment','payment');
wireSeg('currency','currency');
wireSeg('to','to');
// Meal chips toggle off when tapped again.
$('#meal').addEventListener('click', (e) => {
  const b = e.target.closest('button'); if (!b) return;
  const was = b.classList.contains('on');
  document.querySelectorAll('#meal button').forEach(x => x.classList.remove('on'));
  if (!was) b.classList.add('on');
  state.meal = was ? '' : b.dataset.v;
});
wireSeg('type','type', () => {
  $('#meal-wrap').classList.toggle('show', state.type === 'Food');
  $('#to-wrap').classList.toggle('show', state.type === 'Transfer');
  $('#received-wrap').classList.toggle('show', state.type === 'Exchange');
  $('#amount-label').textContent = state.type === 'Exchange' ? 'Amount swapped' : 'Amount';
  if (state.type === 'Exchange') setCurrency('USD'); else if (state.type === 'Transfer') setCurrency('NT');
});
function setCurrency(v) {
  state.currency = v;
  document.querySelectorAll('#currency button').forEach(x => x.classList.toggle('on', x.dataset.v === v));
}

// ---- tab nav ------------------------------------------------------------------
document.querySelector('nav').addEventListener('click', (e) => {
  const b = e.target.closest('button'); if (!b) return;
  document.querySelectorAll('nav button').forEach(x => x.classList.toggle('active', x===b));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  $('#page-'+b.dataset.page).classList.add('active');
  if (b.dataset.page === 'tx') load();   // fresh numbers whenever you look at the list
});

// ---- data: auto-sync -------------------------------------------------------------
async function load() {
  try {
    const r = await fetch('/api/data');
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || r.status);
    DATA = d;
    localStorage.setItem('tripbudget', JSON.stringify(d));
    renderAll();
    const n = new Date();
    $('#subtitle').textContent = d.transactions.length + ' transactions · synced ' + n.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});
  } catch (e) {
    $('#subtitle').textContent = '⚠️ ' + e.message;
  }
}
const cached = localStorage.getItem('tripbudget');
if (cached) { try { DATA = JSON.parse(cached); renderAll(); } catch {} }
load();
document.addEventListener('visibilitychange', () => { if (!document.hidden) load(); });

// ---- submit ------------------------------------------------------------------------
$('#submit').addEventListener('click', async () => {
  const amount = parseFloat(($('#amount').value || '').replace(/,/g,''));
  const received = parseFloat(($('#received').value || '').replace(/,/g,''));
  const msg = $('#msg');
  if (!isFinite(amount) || amount <= 0) { msg.className='err'; msg.textContent = 'Enter an amount'; return; }
  if (state.type === 'Exchange' && !(isFinite(received) && received > 0)) {
    msg.className='err'; msg.textContent = 'Enter the NT$ you received'; return;
  }
  const body = { date: $('#date').value || todayISO(), owner: state.owner, payment: state.payment,
    amount, currency: state.currency, type: state.type,
    tag: state.type === 'Food' ? state.meal : '',
    to: state.type === 'Transfer' ? state.to : '',
    received: state.type === 'Exchange' ? received : '',
    notes: $('#notes').value.trim() };
  $('#submit').disabled = true; msg.className=''; msg.textContent = 'Saving…';
  try {
    const r = await fetch('/api/transactions', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || r.status);
    msg.className='ok'; msg.textContent = '✓ Saved ' + (body.currency==='NT'?'NT$':'US$') + fmt(amount,2) + ' — ' + body.type;
    $('#amount').value=''; $('#notes').value=''; $('#received').value='';
    if (DATA) {
      DATA.transactions.push({ Date: body.date, Owner: body.owner, Payment: body.payment, Amount: amount,
        Currency: body.currency, Type: body.type, Tag: body.tag, To: body.to, Received: body.received,
        Notes: body.notes, 'Logged At': new Date().toISOString() });
      renderAll();
    }
    load();   // pull the authoritative copy back from the sheet
  } catch (e) { msg.className='err'; msg.textContent = '✗ ' + e.message; }
  $('#submit').disabled = false;
});

// ---- render --------------------------------------------------------------------------
function renderAll() { renderTx(); }

function holdings() {
  // Cash each person is physically holding, per currency.
  const h = { Andrew: { USD: DATA?.budget?.startUsd?.Andrew || 0, NT: 0 },
              Keren:  { USD: DATA?.budget?.startUsd?.Keren  || 0, NT: 0 } };
  for (const t of DATA?.transactions || []) {
    const o = h[t.Owner]; if (!o) continue;
    const amt = Number(t.Amount) || 0;
    if (t.Type === 'Exchange') {
      o[t.Currency] -= amt;
      o.NT += Number(t.Received) || amt * rate();
    } else if (t.Type === 'Transfer') {
      o[t.Currency] -= amt;
      if (h[t.To]) h[t.To][t.Currency] += amt;
    } else if (t.Payment === 'Cash') {
      o[t.Currency] -= amt;
    }
  }
  return h;
}

function renderTx() {
  if (!DATA) return;
  const txs = DATA.transactions.slice().sort((a,b) => (b.Date + (b['Logged At']||'')).localeCompare(a.Date + (a['Logged At']||'')));
  const spends = txs.filter(t => !isFlow(t));
  const totNT = spends.filter(t=>t.Currency==='NT').reduce((s,t)=>s+Number(t.Amount),0);
  const totUSD = spends.filter(t=>t.Currency==='USD').reduce((s,t)=>s+Number(t.Amount),0);
  const all = spends.reduce((s,t)=>s+usd(t),0);
  const today = todayISO();
  const todaySpend = spends.filter(t=>t.Date===today).reduce((s,t)=>s+usd(t),0);
  $('#totals').innerHTML = `
    <div class="tot"><div class="v">$${fmt(all,0)}</div><div class="k">Total spent (USD eq.)</div></div>
    <div class="tot"><div class="v">NT$${fmt(totNT)}</div><div class="k">+ US$${fmt(totUSD,0)} spent</div></div>
    <div class="tot"><div class="v">$${fmt(todaySpend,0)}</div><div class="k">Spent today</div></div>
    <div class="tot"><div class="v">${spends.length}</div><div class="k">Expenses logged</div></div>`;

  const h = holdings();
  $('#holdings').innerHTML = ['Andrew','Keren'].map(w => `
    <div class="hold"><span class="who">${w}</span>
      <span class="amts">NT$${fmt(h[w].NT)} <span class="u">· US$${fmt(h[w].USD,0)}</span></span></div>`).join('');

  if (!txs.length) { $('#txlist').innerHTML = '<div class="empty">No transactions yet — add your first!</div>'; return; }
  let html = '', lastDay = '';
  for (const t of txs) {
    if (t.Date !== lastDay) {
      const dayTotal = spends.filter(x=>x.Date===t.Date).reduce((s,x)=>s+usd(x),0);
      html += `<div class="day-h"><span>${t.Date}</span><span>$${fmt(dayTotal,0)} spent</span></div>`;
      lastDay = t.Date;
    }
    let title, sub;
    if (t.Type === 'Exchange') {
      title = `💱 Exchange → NT$${fmt(t.Received)}`;
      sub = `${t.Owner} · swapped ${t.Currency==='NT'?'NT$':'US$'}${fmt(t.Amount)}`;
    } else if (t.Type === 'Transfer') {
      title = `↔︎ ${t.Owner} → ${t.To}`;
      sub = `handed over cash`;
    } else {
      title = `${t.Type}${t.Tag ? '<span class="tag">'+t.Tag+'</span>' : ''}${t.Notes ? ' · <span style="font-weight:400">'+escapeHtml(t.Notes)+'</span>' : ''}`;
      sub = `${t.Owner} · ${t.Payment}`;
    }
    html += `<div class="tx${isFlow(t)?' flow':''}">
      <div class="l"><div class="t">${title}</div><div class="s">${sub}</div></div>
      <div class="r"><div class="a">${t.Currency==='NT'?'NT$':'US$'}${fmt(t.Amount,2)}</div>
        <div class="c">${isFlow(t) ? '' : '≈ $'+fmt(usd(t),1)}</div></div>
    </div>`;
  }
  $('#txlist').innerHTML = html;
}
function escapeHtml(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
</script>
</body>
</html>
